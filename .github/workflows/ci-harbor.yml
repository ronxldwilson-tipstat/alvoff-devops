name: CI - Build & Push Docker Image (Harbor)

on:
  workflow_call:
    outputs:
      IMAGE_TAG:
        description: "Docker image tag (short SHA)"
        value: ${{ jobs.build.outputs.IMAGE_TAG }}
    inputs:
      repo_name:
        description: 'Repository name (used as Docker image name)'
        required: true
        type: string
      harbor_registry:
        description: 'Harbor registry URL'
        required: false
        type: string
        default: 'harbor.tipstat.com'
      harbor_project:
        description: 'Harbor project name'
        required: false
        type: string
        default: 'alvoff'
      platform:
        description: 'Docker build platform'
        required: false
        type: string
        default: 'linux/arm64'
    secrets:
      HARBOR_USERNAME:
        required: true
      HARBOR_PASSWORD:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      IMAGE_TAG: ${{ steps.vars.outputs.IMAGE_TAG }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set build variables
        id: vars
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "IMAGE_TAG=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Image tag: ${SHORT_SHA}"

      - name: Setup QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.harbor_registry }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: ${{ inputs.platform }}
          tags: |
            ${{ inputs.harbor_registry }}/${{ inputs.harbor_project }}/${{ inputs.repo_name }}:${{ steps.vars.outputs.IMAGE_TAG }}
            ${{ inputs.harbor_registry }}/${{ inputs.harbor_project }}/${{ inputs.repo_name }}:latest
          no-cache: true
